name: Mise à jour quotidienne des statistiques Tennis

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    
    # On ajoute explicitement la permission d'écrire dans le dépôt ici
    permissions:
      contents: write

    steps:
    - name: Récupérer le code du dépôt
      uses: actions/checkout@v4 # Mis à jour en v4 (règle l'avertissement Node)

    - name: Configurer Python
      uses: actions/setup-python@v5 # Mis à jour en v5 (règle l'avertissement Node)
      with:
        python-version: '3.x'

    - name: Installer les dépendances
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Exécuter le script de scraping
      run: python scraper.py

    - name: Sauvegarder et pousser le fichier JSON mis à jour
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add stats_tennis_pays.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Mise à jour quotidienne du JSON" && git push)
